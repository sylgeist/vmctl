# Example cloud-init template: a single root disk plus an AHCI-CD device that
# presents the NoCloud seed ISO vmctl builds at `create --cloud-init`.
#
# vmctl keeps templates opaque — it does NOT add the CD device for you. A
# cloud-init VM must use a template like this one whose CD path matches the
# seed ISO vmctl writes: /bhyve/%(name)/%(name)-seed.iso (label "cidata").

acpi_tables=true
destroy_on_poweroff=true
x86.vmexit_on_hlt=true
x86.vmexit_on_pause=true

cpus=2
memory.size=4G

pci.0.0.0.device=hostbridge

pci.0.3.0.device=nvme
pci.0.3.0.path=/bhyve/%(name)/%(name)-root.raw

# NoCloud seed ISO (cloud-init reads meta-data + user-data from the "cidata" volume).
pci.0.5.0.device=ahci
pci.0.5.0.port.0.type=cd
pci.0.5.0.port.0.path=/bhyve/%(name)/%(name)-seed.iso

pci.0.4.0.device=virtio-net
pci.0.4.0.backend=netgraph
pci.0.4.0.path=%(network):
pci.0.4.0.peerhook=link%(link)
pci.0.4.0.socket=bhyve_%(name)
pci.0.4.0.mtu=9000
#pci.0.4.0.mac=%(mac)

pci.0.20.0.device=virtio-rnd
pci.0.31.0.device=lpc
lpc.com1.path=/dev/nmdm%(link)A

bootrom=/usr/local/share/uefi-firmware/BHYVE_UEFI.fd
