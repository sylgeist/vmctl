# Example shared bhyve_config template (bhyve -k).
#
# vmctl renders an ephemeral /var/run/vmctl/<name>.conf at start, substituting
# per-VM placeholders (%(name), %(link)) into this template, then runs:
#   bhyve -k /var/run/vmctl/<name>.conf <name>
#
# Templates declare OS-core settings only (cpus, memory, bootrom, hostbridge,
# rng, lpc console). Everything else is generated from the inventory:
#
#   pci.0.3.N  — disk devices, from the VM's `disks:` list
#   pci.0.4.N  — network interfaces, from `network`/`link`/`mac` + `networks:`
#   pci.0.5.0  — installer ISO (AHCI-CD), generated when `iso:` is present
#   pci.0.6.0  — cloud-init seed ISO (AHCI-CD), generated when `cloud_init:` is present
#
# Do NOT declare pci.0.3.*, pci.0.4.*, pci.0.5.*, pci.0.6.* here — vmctl
# injects them all at start. There is no template/iso pairing requirement.

acpi_tables=true
destroy_on_poweroff=true
x86.vmexit_on_hlt=true
x86.vmexit_on_pause=true

cpus=2
memory.size=4G

pci.0.0.0.device=hostbridge

pci.0.20.0.device=virtio-rnd
pci.0.31.0.device=lpc
lpc.com1.path=/dev/nmdm%(link)A

bootrom=/usr/local/share/uefi-firmware/BHYVE_UEFI.fd
