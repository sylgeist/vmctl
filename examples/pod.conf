# Example shared bhyve_config template (bhyve -k).
#
# vmctl fills in per-VM placeholders (%(name), %(network), %(link), %(mac))
# when it renders the ephemeral /var/run/vmctl/<name>.conf at start, then runs
#   bhyve -k /var/run/vmctl/<name>.conf <name>
#
# vmctl now GENERATES disk devices from each VM's inventory `disks:` list
# (pci.0.3.N). Do NOT declare pci.0.3.* disks here. Net, console, and any CD
# devices stay in the flavor and use %() placeholders, which vmctl resolves when
# it renders the ephemeral /var/run/vmctl/<name>.conf at start.

acpi_tables=true
destroy_on_poweroff=true
x86.vmexit_on_hlt=true
x86.vmexit_on_pause=true

cpus=2
memory.size=4G

pci.0.0.0.device=hostbridge

pci.0.4.0.device=virtio-net
pci.0.4.0.backend=netgraph
pci.0.4.0.path=%(network):
pci.0.4.0.peerhook=link%(link)
pci.0.4.0.socket=bhyve_%(name)
pci.0.4.0.mtu=9000
#pci.0.4.0.mac=%(mac)

pci.0.20.0.device=virtio-rnd
pci.0.31.0.device=lpc
lpc.com1.path=/dev/nmdm%(link)A

bootrom=/usr/local/share/uefi-firmware/BHYVE_UEFI.fd
