# Example shared bhyve_config template (bhyve -k).
#
# vmctl fills in the per-VM placeholders at start:
#   bhyve -k pod.conf -o network=labs_vlan50 -o link=10 pod34
# %(name), %(network), %(link), and %(mac) are substituted by bhyve's -o flags.
#
# This template declares TWO nvme disks (root + zfs), so a VM using it should
# list both in its inventory `disks:` (vmctl creates exactly the disks listed).

acpi_tables=true
destroy_on_poweroff=true
x86.vmexit_on_hlt=true
x86.vmexit_on_pause=true

cpus=2
memory.size=4G

pci.0.0.0.device=hostbridge

pci.0.3.0.device=nvme
pci.0.3.0.path=/bhyve/%(name)/%(name)-root.raw
pci.0.3.1.device=nvme
pci.0.3.1.path=/bhyve/%(name)/%(name)-zfs.raw

pci.0.4.0.device=virtio-net
pci.0.4.0.backend=netgraph
pci.0.4.0.path=%(network):
pci.0.4.0.peerhook=link%(link)
pci.0.4.0.socket=bhyve_%(name)
pci.0.4.0.mtu=9000
#pci.0.4.0.mac=%(mac)

pci.0.20.0.device=virtio-rnd
pci.0.31.0.device=lpc
lpc.com1.path=/dev/nmdm%(link)A

bootrom=/usr/local/share/uefi-firmware/BHYVE_UEFI.fd
