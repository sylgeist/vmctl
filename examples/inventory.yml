# Example vmctl inventory.
#
# Copy to /usr/local/etc/vmctl/inventory.yml (or pass with `vmctl -c FILE`).
# This is the single source of truth: vmctl reads/writes it and reconstructs the
# exact `bhyve -k <template> -o ...` invocation for each VM from these values.

defaults:
  config_dir: /bhyve/configs   # where the shared .conf templates live
  vm_root: /bhyve              # <vm_root>/<name>/ holds each VM's raw image(s)
  zpool: tank/bhyve            # parent ZFS dataset; each VM gets <zpool>/<name>
  template: pod.conf           # default shared config when a VM omits `config:`
  link_base: 10                # lowest auto-assigned link (0-9 left for manual use)
  run_dir: /var/run/vmctl      # supervisor pidfiles
  log_dir: /var/log/vmctl      # per-VM bhyve output
  image_dir: /bhyve/images     # golden base images (the `from:` sources)
  root_size: 20G               # default size of the single root disk on `create`
  root_from: base-14.raw       # default golden image for root (set null for a blank disk)

vms:
  # A two-disk VM (root + a separate data disk), started at host boot.
  # Recreate it with:
  #   vmctl create pod34 --network labs_vlan50 --disk zfs:100G --autostart
  # pod.conf declares two nvme disks, so the inventory lists two disks to match.
  pod34:
    config: pod.conf
    network: labs_vlan50       # netgraph bridge (must already exist; vmctl never creates bridges)
    link: 10                   # globally unique: netgraph peerhook AND /dev/nmdm10
    mac: null                  # null => bhyve auto-generates a MAC
    autostart: true            # started by `vmctl start --all` (the rc.d shim) at boot
    disks:
      - { file: pod34-root.raw, size: 20G, from: base-14.raw }  # cloned from the golden image
      - { file: pod34-zfs.raw,  size: 100G }                    # blank second disk

  # A cloud-init VM (root only). Its template carries an AHCI-CD device that
  # points at the generated seed ISO. Create it with:
  #   vmctl create web1 --config pod-cloudinit.conf --network labs_vlan50 \
  #         --mac generate --cloud-init examples/user-data.yml
  web1:
    config: pod-cloudinit.conf
    network: labs_vlan50
    link: 11
    mac: 5a:9c:fc:00:00:11     # a pinned, locally-administered MAC (stable across moves)
    autostart: false
    disks:
      - { file: web1-root.raw, size: 20G, from: base-14.raw }
    cloud_init:
      user_data: web1-user-data.yml   # vmctl packs this verbatim into web1-seed.iso
