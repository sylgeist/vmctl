# Example vmctl inventory.
#
# Copy to /usr/local/etc/vmctl/inventory.yml (or pass with `vmctl -c FILE`).
# This is the single source of truth: vmctl reads/writes it and renders ephemeral
# /var/run/vmctl/<name>.conf configs from the template, substituting placeholders.

defaults:
  config_dir: /bhyve/configs   # where the shared .conf templates live
  vm_root: /bhyve              # <vm_root>/<name>/ holds each VM's raw image(s)
  zpool: tank/bhyve            # parent ZFS dataset; each VM gets <zpool>/<name>
  template: pod.conf           # default shared config when a VM omits `config:`
  link_base: 10                # lowest auto-assigned link (0-9 left for manual use)
  run_dir: /var/run/vmctl      # supervisor pidfiles
  log_dir: /var/log/vmctl      # per-VM bhyve output
  image_dir: /bhyve/images     # golden base images (the `from:` sources)
  root_size: 20G               # default size of the single root disk on `create`
  root_from: base-14.raw       # default golden image for root (set null for a blank disk)
  cpus: 1                      # default vCPU count; per-VM override with `cpus:`
  memory: 1G                   # default memory (Sizes format: 1G/512M); per-VM override with `memory:`
  vnc_base: 5900               # VNC port = vnc_base + link, for VMs with `graphics: true`
  vnc_bind: 0.0.0.0            # VNC bind address; 0.0.0.0 is reachable from any routable host

vms:
  # A two-disk VM (root + a separate data disk), started at host boot.
  # Recreate it with:
  #   vmctl create pod34 --network labs_vlan50 --disk zfs:100G --autostart
  # pod.conf declares two nvme disks, so the inventory lists two disks to match.
  pod34:
    config: pod.conf
    network: labs_vlan50       # netgraph bridge (must already exist; vmctl never creates bridges)
    link: 10                   # globally unique: netgraph peerhook AND /dev/nmdm10
    mac: null                  # null => bhyve auto-generates a MAC
    autostart: true            # started by `vmctl start --all` (the rc.d shim) at boot
    cpus: 2                    # per-VM override of defaults.cpus
    memory: 4G                 # per-VM override of defaults.memory
    # graphics: true           # attach a VNC console (fbuf) + USB tablet;
    #                          # reachable at <vnc_bind>:<vnc_base + link> (0.0.0.0:5910)
    disks:
      - { file: pod34-root.raw, size: 20G, from: base-14.raw }  # cloned from the golden image
      - { file: pod34-zfs.raw,  size: 100G }                    # blank second disk

  # A cloud-init VM (root only). vmctl generates the NoCloud seed ISO
  # (pci.0.6.0) from `cloud_init:` — no special template needed; pod.conf works.
  # Create it with:
  #   vmctl create web1 --network labs_vlan50 --mac generate \
  #         --cloud-init web-base.yml --start
  web1:
    config: pod.conf
    network: labs_vlan50
    link: 11
    mac: 5a:9c:fc:00:00:11     # a pinned, locally-administered MAC (stable across moves)
    autostart: false
    disks:
      - { file: web1-root.raw, size: 20G, from: base-14.raw }
    cloud_init:
      user_data: web-base.yml   # a template in config_dir; vmctl renders + packs into seed.iso
      vars:
        role: web

  # An installer-ISO VM. vmctl attaches the ISO at pci.0.5.0 — no %(iso) in the
  # template; pod.conf works for this too.
  #   vmctl create install1 --network labs_vlan50 --iso /bhyve/isos/freebsd-14.3.iso --start
  # install1:
  #   config: pod.conf
  #   network: labs_vlan50
  #   link: 12
  #   mac: null
  #   autostart: false
  #   iso: /bhyve/isos/freebsd-14.3.iso
  #   disks:
  #     - { file: install1-root.raw, size: 20G }
